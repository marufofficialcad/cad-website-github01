kind = "web"
previewPath = "/"
title = "Garment Shrinkage Calculator Pro"
version = "1.0.0"
id = "artifacts/garment-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19463

[services.development]
run = "pnpm --filter @workspace/garment-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garment-calculator", "run", "build" ]
publicDir = "artifacts/garment-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19463"
BASE_PATH = "/"
